<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brainbox CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:       #f5f4f0;
  --surface:  #ffffff;
  --border:   #e2e0da;
  --text:     #1a1917;
  --text2:    #6b6860;
  --text3:    #a09e9a;
  --accent:   #d4380d;
  --accent-s: #fff1ed;
  --green:    #389e0d;
  --green-s:  #f6ffed;
  --blue:     #1677ff;
  --blue-s:   #e8f4ff;
  --gold:     #d48806;
  --gold-s:   #fffbe6;
  --purple:   #722ed1;
  --purple-s: #f9f0ff;
  --teal:     #08979c;
  --teal-s:   #e6fffb;
  --orange:   #d46b08;
  --orange-s: #fff7e6;
  --grey:     #595959;
  --grey-s:   #f5f5f5;
  --radius:   10px;
  --shadow:   0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --sidebar:  240px;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ── AUTH ─────────────────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;box-shadow:var(--shadow-lg)}
.auth-logo{font-size:22px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px}
.auth-logo span{color:var(--accent)}
.auth-sub{color:var(--text2);font-size:13px;margin-bottom:28px}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;background:var(--bg);border-radius:8px;padding:3px}
.auth-tab{flex:1;border:none;background:transparent;padding:7px;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s}
.auth-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.auth-err{color:var(--accent);font-size:13px;min-height:20px;margin-bottom:8px}
.field-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;margin-top:14px}
.field-input{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-family:var(--font);font-size:14px;background:var(--surface);color:var(--text);outline:none;transition:border .15s}
.field-input:focus{border-color:var(--accent)}
.auth-btn{width:100%;margin-top:20px;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.auth-btn:hover{opacity:.9}

/* ── SHELL ────────────────────────────────────────── */
.shell{display:flex;min-height:100vh}

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sb-head{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sb-logo{font-size:16px;font-weight:600;letter-spacing:-.3px}
.sb-logo span{color:var(--accent)}
.sb-user{font-size:11px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.sb-nav{flex:1;padding:12px 8px;overflow-y:auto}
.sb-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:8px 8px 4px}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;border:none;background:transparent;padding:8px 10px;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .12s;text-align:left}
.sb-btn:hover{background:var(--bg);color:var(--text)}
.sb-btn.active{background:var(--accent-s);color:var(--accent)}
.sb-btn svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.sb-btn.active svg{opacity:1}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}

/* ── MAIN ─────────────────────────────────────────── */
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-.2px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.content{padding:24px;flex:1}

/* ── BUTTONS ──────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;border:1px solid var(--border);background:var(--surface);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{opacity:.9;background:var(--accent)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn svg{width:14px;height:14px}

/* ── SEARCH ───────────────────────────────────────── */
.search-wrap{position:relative}
.search-input{border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;font-family:var(--font);font-size:13px;background:var(--bg);outline:none;color:var(--text);width:260px;transition:border .15s}
.search-input:focus{border-color:var(--accent);background:var(--surface)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}

/* ── STAT CARDS ───────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-val{font-size:28px;font-weight:600;letter-spacing:-.5px;line-height:1}
.stat-label{font-size:12px;color:var(--text2);margin-top:5px}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── TABLE ────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:13px;font-weight:600}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable:hover td{background:var(--bg);cursor:pointer}
.empty-row td{text-align:center;color:var(--text3);padding:40px;font-size:13px}

/* ── BADGES ───────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-active{background:var(--green-s);color:var(--green)}
.badge-inactive{background:var(--grey-s);color:var(--grey)}
.badge-prospect{background:var(--blue-s);color:var(--blue)}

/* ── EVENT CHIP ───────────────────────────────────── */
.event-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}

/* ── TIMELINE ─────────────────────────────────────── */
.timeline{padding:4px 0}
.tl-item{display:flex;gap:14px;padding:12px 0;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:18px;top:38px;bottom:0;width:1px;background:var(--border)}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid var(--border);background:var(--surface)}
.tl-body{flex:1;padding-top:4px}
.tl-title{font-weight:600;font-size:13px}
.tl-meta{font-size:12px;color:var(--text2);margin-top:2px}
.tl-note{font-size:12px;color:var(--text2);margin-top:5px;background:var(--bg);border-radius:6px;padding:6px 10px;border:1px solid var(--border)}
.tl-campaign{font-size:11px;color:var(--text3);margin-top:3px}

/* ── MODAL ────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-.2px}
.modal-close{border:none;background:transparent;cursor:pointer;color:var(--text2);padding:4px;border-radius:5px;display:flex}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
select.field-input{appearance:none;cursor:pointer}
textarea.field-input{resize:vertical;min-height:80px}

/* ── CUSTOMER DETAIL ──────────────────────────────── */
.detail-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:24px}
.detail-avatar{width:52px;height:52px;border-radius:12px;background:var(--accent-s);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.detail-name{font-size:20px;font-weight:700;letter-spacing:-.3px}
.detail-meta{color:var(--text2);font-size:13px;margin-top:3px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.info-block{background:var(--bg);border-radius:8px;padding:12px 14px}
.info-label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:4px}
.info-value{font-size:13px;font-weight:500}

/* ── CSV UPLOADER ─────────────────────────────────── */
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-s)}
.drop-icon{font-size:32px;margin-bottom:10px}
.drop-text{font-size:14px;font-weight:500;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text2)}
.csv-preview{margin-top:16px;background:var(--bg);border-radius:8px;padding:12px;font-family:var(--mono);font-size:12px;max-height:150px;overflow-y:auto;border:1px solid var(--border)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

/* ── TOAST ────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── TAGS ─────────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .12s;color:var(--text2)}
.filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── LOADING ──────────────────────────────────────── */
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row td{text-align:center;padding:40px}

/* ── MOBILE ───────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .25s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .stats-row{grid-template-columns:1fr 1fr}
  .detail-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .search-input{width:100%}
}
.mob-btn{display:none;border:none;background:transparent;cursor:pointer;padding:4px;color:var(--text2)}
@media(max-width:768px){.mob-btn{display:flex}}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .2s ease}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authWrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Brainbox <span>CRM</span></div>
    <div class="auth-sub">Trade customer management</div>
    <div class="auth-err" id="authErr"></div>
    <label class="field-label">Email</label>
    <input class="field-input" type="email" id="authEmail" placeholder="you@brainboxcandy.com"/>
    <label class="field-label">Password</label>
    <input class="field-input" type="password" id="authPass" placeholder="Password"/>
    <button class="auth-btn" id="authSubmit" onclick="doAuth()">Sign in</button>
    <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:14px">Access by invitation only. Contact your administrator.</p>
  </div>
</div>

<!-- APP -->
<div id="appShell" class="shell" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">Brainbox <span>CRM</span></div>
      <div class="sb-user" id="sbUser"></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-label">Main</div>
      <button class="sb-btn active" data-page="dashboard" onclick="nav(this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1.5"/><rect x="9" y="1" width="6" height="6" rx="1.5"/><rect x="1" y="9" width="6" height="6" rx="1.5"/><rect x="9" y="9" width="6" height="6" rx="1.5"/></svg>
        Dashboard
      </button>
      <button class="sb-btn" data-page="customers" onclick="nav(this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm-5 6a5 5 0 0110 0H3z"/></svg>
        Customers
      </button>
      <button class="sb-btn" data-page="campaigns" onclick="nav(this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M2 4a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4zm2 0v1h8V4H4zm0 3v1h5V7H4zm0 3v1h3v-1H4z"/></svg>
        Campaigns
      </button>
      <button class="sb-btn" data-page="csv" onclick="nav(this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 1v8.586l2.293-2.293 1.414 1.414L8 12.414l-3.707-3.707 1.414-1.414L8 9.586V1h0zM2 14h12v-2H2v2z"/></svg>
        Bulk Upload
      </button>
      <div class="sb-label" style="margin-top:8px">Settings</div>
      <button class="sb-btn" data-page="event-types" onclick="nav(this)">
        <svg viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.22 3.22l1.42 1.42M11.36 11.36l1.42 1.42M3.22 12.78l1.42-1.42M11.36 4.64l1.42-1.42"/></svg>
        Event Types
      </button>
    </nav>
    <div class="sb-footer">
      <button class="sb-btn" onclick="signOut()">
        <svg viewBox="0 0 16 16" fill="currentColor"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="mob-btn" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><rect y="3" width="16" height="1.5" rx=".75"/><rect y="7.25" width="16" height="1.5" rx=".75"/><rect y="11.5" width="16" height="1.5" rx=".75"/></svg>
      </button>
      <span class="topbar-title" id="topbarTitle">Dashboard</span>
      <div class="topbar-right" id="topbarActions"></div>
    </div>
    <div class="content" id="pageContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M12 4L4 12M4 4l8 8"/><path stroke="currentColor" stroke-width="1.5" d="M12 4L4 12M4 4l8 8" fill="none"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────
const SUPABASE_URL  = 'https://ypfwecopdsielnouxwzv.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlwZndlY29wZHNpZWxub3V4d3p2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3NDMyNjgsImV4cCI6MjA5MTMxOTI2OH0.ll4Epk7es-knrgbG6j0e5xo59OEdMFwpxeWmMs9RfpU';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ────────────────────────────────────────────
let currentUser = null;
let currentPage = 'dashboard';
let eventTypes  = [];

// ── AUTH ─────────────────────────────────────────────
let authMode = 'in';
function switchTab(m) {
  authMode = m;
  document.getElementById('tabIn').classList.toggle('active', m==='in');
  document.getElementById('tabUp').classList.toggle('active', m==='up');
  document.getElementById('authSubmit').textContent = m==='in' ? 'Sign in' : 'Create account';
  document.getElementById('authErr').textContent = '';
}

async function doAuth() {
  const email = document.getElementById('authEmail').value.trim();
  const pass  = document.getElementById('authPass').value;
  const errEl = document.getElementById('authErr');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Please fill in all fields.'; return; }
  const btn = document.getElementById('authSubmit');
  btn.disabled = true; btn.textContent = '…';
  const fn = authMode === 'in'
    ? sb.auth.signInWithPassword({ email, password: pass })
    : sb.auth.signUp({ email, password: pass });
  const { data, error } = await fn;
  btn.disabled = false; btn.textContent = authMode==='in' ? 'Sign in' : 'Create account';
  if (error) { errEl.textContent = error.message; return; }
  if (authMode==='up') { errEl.style.color='var(--green)'; errEl.textContent='Check your email to confirm.'; return; }
  currentUser = data.user;
  launchApp();
}

document.getElementById('authEmail').addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); });
document.getElementById('authPass').addEventListener('keydown',  e => { if(e.key==='Enter') doAuth(); });

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

async function initAuth() {
  const { data } = await sb.auth.getSession();
  if (data.session) { currentUser = data.session.user; launchApp(); }
}

function launchApp() {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('sbUser').textContent = currentUser.email;
  loadEventTypes().then(() => renderPage('dashboard'));
}

// ── NAVIGATION ───────────────────────────────────────
function nav(btn) {
  document.querySelectorAll('.sb-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const page = btn.dataset.page;
  currentPage = page;
  const titles = { dashboard:'Dashboard', customers:'Customers', campaigns:'Campaigns', csv:'Bulk Upload', 'event-types':'Event Types' };
  document.getElementById('topbarTitle').textContent = titles[page] || page;
  renderPage(page);
  if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── DATA ─────────────────────────────────────────────
async function loadEventTypes() {
  const { data } = await sb.from('crm_event_types').select('*').order('name');
  eventTypes = data || [];
}

function getEventType(id) {
  return eventTypes.find(e => e.id === id) || { name:'Unknown', icon:'📋', colour:'#999' };
}

// ── PAGES ────────────────────────────────────────────
function renderPage(page) {
  const content = document.getElementById('pageContent');
  content.innerHTML = '<div class="spinner"></div>';
  document.getElementById('topbarActions').innerHTML = '';
  const pages = { dashboard: renderDashboard, customers: renderCustomers, campaigns: renderCampaigns, csv: renderCsv, 'event-types': renderEventTypes };
  if (pages[page]) pages[page]();
}

function renderCsv() {
  const opts = eventTypes.map(e=>`<option value="${e.id}">${e.icon} ${e.name}</option>`).join('');
  const { data: campaigns } = { data: [] };

  document.getElementById('pageContent').innerHTML = `
    <div class="fade-up" style="max-width:680px">
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><span class="card-title">Bulk Event Upload</span></div>
        <div style="padding:20px">
          <p style="color:var(--text2);font-size:13px;margin-bottom:18px">Upload a CSV of customer KashFlow IDs to log the same event for all of them at once. The CSV should have a column named <code style="font-family:var(--mono);background:var(--bg);padding:1px 5px;border-radius:4px">kashflow_id</code> (one ID per row).</p>
          <div class="form-grid" style="margin-bottom:14px">
            <div class="form-row"><label class="field-label">Event Type *</label><select class="field-input" id="csv_type">${opts}</select></div>
            <div class="form-row"><label class="field-label">Date *</label><input class="field-input" type="date" id="csv_date" value="${today()}"/></div>
          </div>
          <div class="form-row"><label class="field-label">Notes (applied to all)</label><textarea class="field-input" id="csv_notes" placeholder="e.g. Spring 2026 brochure posted" style="min-height:60px"></textarea></div>
          <div class="form-row"><label class="field-label">Logged by</label><input class="field-input" id="csv_by" value="${currentUser?.email||''}"/></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Upload CSV</span></div>
        <div style="padding:20px">
          <div class="drop-zone" id="dropZone" onclick="document.getElementById('csvFile').click()">
            <div class="drop-icon">📄</div>
            <div class="drop-text">Click to choose a CSV file</div>
            <div class="drop-sub">or drag and drop it here</div>
          </div>
          <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCsvFile(this)"/>
          <div id="csvPreview"></div>
          <div id="csvActions" style="margin-top:16px;display:none">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
              <span id="csvCount" style="font-size:13px;color:var(--text2)"></span>
              <button class="btn btn-primary" onclick="processCsv()">Upload Events</button>
            </div>
            <div class="progress-bar" id="csvProgress" style="display:none"><div class="progress-fill" id="csvFill" style="width:0%"></div></div>
          </div>
        </div>
      </div>
    </div>`;

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f){document.getElementById('csvFile').files=e.dataTransfer.files;handleCsvFile({files:[f]});} });
}

let csvRows = [];
function handleCsvFile(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
    if (lines.length < 2) { toast('CSV appears empty'); return; }
    const header = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
    const idCol = header.findIndex(h => h==='kashflow_id' || h==='kashflowid' || h==='kf_id' || h==='id');
    if (idCol === -1) { toast('No kashflow_id column found'); return; }
    csvRows = lines.slice(1).map(l=>{
      const cols = l.split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      return cols[idCol];
    }).filter(Boolean);
    document.getElementById('csvPreview').innerHTML = `
      <div class="csv-preview">${csvRows.slice(0,10).join('\n')}${csvRows.length>10?`\n…and ${csvRows.length-10} more`:''}</div>`;
    document.getElementById('csvCount').textContent = `${csvRows.length} customer IDs found`;
    document.getElementById('csvActions').style.display = 'block';
  };
  reader.readAsText(file);
}

async function processCsv() {
  if (!csvRows.length) { toast('No rows to upload'); return; }
  const typeId = parseInt(document.getElementById('csv_type').value);
  const date   = document.getElementById('csv_date').value;
  const notes  = document.getElementById('csv_notes').value.trim()||null;
  const by     = document.getElementById('csv_by').value.trim()||null;
  if (!date) { toast('Please select a date'); return; }

  document.getElementById('csvProgress').style.display = 'block';

  // Look up customer IDs from KashFlow IDs
  const { data: customers } = await sb.from('crm_customers')
    .select('id, kashflow_id').in('kashflow_id', csvRows);

  const found = customers||[];
  const missing = csvRows.filter(id => !found.find(c=>c.kashflow_id===id));

  if (!found.length) { toast('No matching customers found in CRM'); document.getElementById('csvProgress').style.display='none'; return; }

  const events = found.map(c=>({ customer_id:c.id, event_type_id:typeId, event_date:date, notes, logged_by:by }));

  // Insert in batches of 100
  let done = 0;
  for (let i=0; i<events.length; i+=100) {
    await sb.from('crm_contact_events').insert(events.slice(i, i+100));
    done += Math.min(100, events.length-i);
    document.getElementById('csvFill').style.width = Math.round(done/events.length*100)+'%';
  }

  document.getElementById('csvProgress').style.display='none';
  let msg = `✓ ${found.length} events logged`;
  if (missing.length) msg += ` · ${missing.length} IDs not found`;
  toast(msg);
  csvRows = [];
  document.getElementById('csvPreview').innerHTML='';
  document.getElementById('csvActions').style.display='none';
}

    <div class="form-grid">
      <div class="form-row"><label class="field-label">Icon (emoji)</label><input class="field-input" id="et_icon" placeholder="📮" maxlength="4"/></div>
      <div class="form-row"><label class="field-label">Colour</label><input class="field-input" type="color" id="et_colour" value="#6366f1"/></div>
    </div>
  `, `<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveEventType()">Save</button>`);
}

async function saveEventType() {
  const name = document.getElementById('et_name').value.trim();
  if (!name) { toast('Name required'); return; }
  const { error } = await sb.from('crm_event_types').insert({
    name, icon: document.getElementById('et_icon').value.trim()||'📋',
    colour: document.getElementById('et_colour').value,
  });
  if (error) { toast('Error: '+error.message); return; }
  closeModal(); toast('Event type added ✓');
  await loadEventTypes(); renderEventTypes();
}

async function deleteEventType(id, name) {
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
  const { error } = await sb.from('crm_event_types').delete().eq('id', id);
  if (error) { toast('Error: '+error.message); return; }
  toast('Deleted ✓'); await loadEventTypes(); renderEventTypes();
}

// ── MODAL ─────────────────────────────────────────────
function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer||'';
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal() { document.getElementById('modalOverlay').style.display='none'; }
function closeModalOnBg(e) { if(e.target===document.getElementById('modalOverlay')) closeModal(); }

// ── HELPERS ───────────────────────────────────────────
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function today() { return new Date().toISOString().slice(0,10); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ──────────────────────────────────────────────
initAuth();
</script>
</body>
</html>
